<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経費申請</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  :root{--bg:#f5f4f0;--surface:#fff;--border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.2);--text:#1a1a1a;--text-muted:#888;--text-hint:#bbb;--accent:#1a1a1a;--blue-bg:#e8f0fe;--blue-text:#1a56db;--green-bg:#e3f5e9;--green-text:#1a7d3a;--amber-bg:#fff8e1;--amber-text:#a05e00;--red-bg:#fde8e8;--red-text:#c81e1e;--radius:10px;--radius-lg:14px;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
  .logo{font-size:16px;font-weight:700}.logo span{color:var(--text-muted);font-weight:400}
  .main{max-width:520px;margin:0 auto;padding:16px}
  .gas-banner{background:var(--amber-bg);border:1px solid rgba(160,94,0,0.2);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--amber-text)}
  .gas-banner input{width:100%;margin-top:8px;padding:8px 10px;border:1px solid rgba(160,94,0,0.3);border-radius:var(--radius);font-size:13px;font-family:inherit;background:#fff;color:var(--text)}
  .gas-banner .save-btn{margin-top:8px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer}
  .connected-badge{background:var(--green-bg);border:1px solid rgba(26,125,58,0.2);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--green-text);display:none;align-items:center;gap:8px}
  .connected-badge.on{display:flex}
  .tabs{display:flex;background:var(--surface);border-radius:var(--radius-lg);padding:4px;gap:2px;margin-bottom:16px;border:1px solid var(--border)}
  .tab{flex:1;padding:9px 8px;border-radius:var(--radius);text-align:center;cursor:pointer;font-size:13px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:4px;transition:all 0.15s}
  .tab.active{background:var(--accent);color:#fff;font-weight:500}
  .tab .badge{background:#e53e3e;color:#fff;border-radius:20px;padding:0 5px;font-size:10px;min-width:16px;height:16px;display:none;align-items:center;justify-content:center}
  .tab .badge.on{display:flex}
  .tab.active .badge{background:rgba(255,255,255,0.3)}
  .view{display:none}.view.active{display:block}
  .card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:16px;margin-bottom:12px}
  .scanning{display:none;align-items:center;gap:10px;padding:12px 16px;background:var(--blue-bg);border-radius:var(--radius);color:var(--blue-text);font-size:13px;margin-top:10px;font-weight:500}
  .scanning.on{display:flex}
  .dots{display:flex;gap:4px}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:bl 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .preview-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:14px;margin-top:10px;display:none}
  .preview-card.on{display:block}
  .ai-badge{display:inline-flex;align-items:center;gap:3px;background:var(--blue-bg);color:var(--blue-text);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-bottom:8px}
  .preview-inner{display:flex;gap:12px;align-items:flex-start}
  .preview-thumb{width:60px;height:60px;border-radius:var(--radius);object-fit:cover;border:1px solid var(--border);flex-shrink:0}
  .preview-fields{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pf{display:flex;flex-direction:column;gap:3px}
  .pf label{font-size:10px;color:var(--text-muted);font-weight:700;letter-spacing:0.3px;text-transform:uppercase}
  .pf input,.pf select,.pf textarea{padding:6px 8px;border:1px solid var(--border-strong);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);background:var(--surface);outline:none;width:100%}
  .pf textarea{resize:none;min-height:52px}
  .pf.full{grid-column:1/-1}
  .add-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px}
  .draft-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .draft-title{font-weight:700;font-size:15px}
  .draft-count{background:var(--amber-bg);color:var(--amber-text);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
  .draft-item{padding:10px 0;border-bottom:1px solid var(--border)}
  .draft-item:last-child{border-bottom:none;padding-bottom:0}
  .draft-item-row{display:flex;gap:10px;align-items:center}
  .draft-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
  .draft-thumb-ph{width:36px;height:36px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .draft-info{flex:1;min-width:0}
  .draft-name{font-weight:500;font-size:13px}
  .draft-meta{font-size:12px;color:var(--text-muted);margin-top:1px}
  .draft-amount{font-weight:700;font-size:14px;flex-shrink:0}
  .item-btns{display:flex;gap:4px;flex-shrink:0}
  .edit-btn{background:var(--blue-bg);border:none;color:var(--blue-text);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;font-family:inherit;font-weight:500}
  .delete-btn{background:none;border:none;color:var(--text-hint);cursor:pointer;font-size:18px;padding:0 4px}
  .edit-form{display:none;margin-top:10px;background:var(--bg);border-radius:var(--radius);padding:12px}
  .edit-form.on{display:block}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ef{display:flex;flex-direction:column;gap:3px}
  .ef label{font-size:10px;color:var(--text-muted);font-weight:700;letter-spacing:0.3px;text-transform:uppercase}
  .ef input,.ef select,.ef textarea{padding:6px 8px;border:1px solid var(--border-strong);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);background:var(--surface);outline:none;width:100%}
  .ef textarea{resize:none;min-height:52px}
  .ef.full{grid-column:1/-1}
  .save-edit-btn{width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:8px}
  .total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:13px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:4px}
  .total-amount{font-size:18px;font-weight:700;color:var(--text)}
  .submit-all-btn{width:100%;padding:14px;background:#1a7d3a;color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}
  .submit-all-btn:disabled{opacity:0.4;cursor:not-allowed}
  .sending{display:none;align-items:center;gap:10px;padding:12px 16px;background:var(--green-bg);border-radius:var(--radius);color:var(--green-text);font-size:13px;margin-top:8px;font-weight:500}
  .sending.on{display:flex}
  .empty-draft{text-align:center;padding:24px 0;color:var(--text-muted);font-size:13px}
  .empty-draft .e-icon{font-size:32px;display:block;margin-bottom:6px;opacity:0.35}
  .saved-badge{background:var(--green-bg);color:var(--green-text);border-radius:var(--radius);padding:8px 12px;font-size:12px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
  .toast{background:var(--accent);color:#fff;padding:10px 20px;border-radius:40px;font-size:13px;font-weight:500;display:none;white-space:nowrap}
  .choice-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .choice-btn{padding:14px;border:2px solid var(--border-strong);border-radius:var(--radius-lg);background:var(--surface);cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:6px}
  .choice-btn:hover{background:var(--bg)}
  .choice-btn .cb-icon{font-size:28px}
</style>
</head>
<body>
<header>
  <span style="font-size:22px">📷</span>
  <div class="logo">経費申請 <span>/ 申請者用</span></div>
</header>
<div class="main">
  <div class="gas-banner" id="gas-banner">
    <strong>⚙️ 初回設定：Google Apps Script の URL を入力</strong>
    <input type="text" id="gas-url-input" placeholder="https://script.google.com/macros/s/...">
    <button class="save-btn" onclick="saveGasUrl()">保存して接続</button>
  </div>
  <div class="connected-badge" id="connected-badge">
    ✅ <strong>スプレッドシート接続済み</strong>
    <button onclick="resetGasUrl()" style="margin-left:auto;background:none;border:none;color:var(--green-text);cursor:pointer;font-size:12px">変更</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="sw('scan')">📷 撮影</div>
    <div class="tab" onclick="sw('draft')">📋 リスト<div class="badge" id="draft-badge">0</div></div>
  </div>
  <div class="view active" id="view-scan">
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:12px;color:var(--text-muted);font-weight:700;white-space:nowrap">お名前</span>
        <input type="text" id="applicant-name" placeholder="田中 太郎（一度入力すれば保存）" style="flex:1;padding:8px 10px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:inherit;font-size:13px;outline:none" oninput="localStorage.setItem('applicantName',this.value)">
      </div>
      <input type="file" id="fi-camera" accept="image/*" capture="environment" style="display:none" onchange="onFile(this.files[0])">
      <input type="file" id="fi-library" accept="image/*" style="display:none" onchange="onFile(this.files[0])">
      <div class="choice-btns">
        <button class="choice-btn" onclick="document.getElementById('fi-camera').click()"><span class="cb-icon">📷</span>今すぐ撮影</button>
        <button class="choice-btn" onclick="document.getElementById('fi-library').click()"><span class="cb-icon">🖼️</span>フォルダから選ぶ</button>
      </div>
      <div class="scanning" id="scan-msg"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>AIが読み取り中...</div>
    </div>
    <div class="preview-card" id="preview-card">
      <div class="ai-badge">✨ AI自動入力 — 確認して追加</div>
      <div class="preview-inner">
        <div id="prev-thumb-wrap"></div>
        <div class="preview-fields">
          <div class="pf"><label>日付</label><input type="date" id="p-date"></div>
          <div class="pf"><label>金額（円）</label><input type="number" id="p-amount" placeholder="0"></div>
          <div class="pf"><label>カテゴリ</label><select id="p-cat"><option>交通費</option><option>出張費</option><option>備品・消耗品</option><option>接待・会食費</option><option>その他</option></select></div>
          <div class="pf"><label>店舗</label><input type="text" id="p-store" placeholder="店舗名"></div>
          <div class="pf full"><label>使用目的・メモ</label><textarea id="p-desc" placeholder="例：電球3個、〇〇現場用"></textarea></div>
        </div>
      </div>
      <button class="add-btn" onclick="addToDraft()">＋ リストに追加して保存</button>
    </div>
  </div>
  <div class="view" id="view-draft">
    <div class="saved-badge">💾 リストはこのスマホに自動保存されています</div>
    <div class="card">
      <div class="draft-header"><div class="draft-title">一時保存リスト</div><div class="draft-count" id="draft-count-label">0件</div></div>
      <div id="draft-list"><div class="empty-draft"><span class="e-icon">📋</span>領収書を撮影してリストに追加してください<br><span style="font-size:12px;margin-top:4px;display:block">ページを閉じても保存されます</span></div></div>
      <div class="total-row" id="total-row" style="display:none"><span>合計金額</span><span class="total-amount" id="total-amount">¥0</span></div>
    </div>
    <div class="sending" id="sending-msg"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>スプレッドシートに送信中...</div>
    <button class="submit-all-btn" id="submit-all-btn" onclick="submitAll()" disabled>✈️ まとめて申請する</button>
  </div>
</div>
<div class="toast-wrap"><div class="toast" id="toast"></div></div>
<script>
let drafts=[],curImg=null,nid=Date.now();
const savedName=localStorage.getItem('applicantName');
if(savedName)document.getElementById('applicant-name').value=savedName;
function saveDrafts(){const toSave=drafts.map(r=>({...r,image:null}));try{localStorage.setItem('drafts',JSON.stringify(toSave));}catch(e){}}
function loadDrafts(){try{const d=localStorage.getItem('drafts');if(d)drafts=JSON.parse(d);}catch(e){drafts=[];}}
loadDrafts();
let gasUrl=localStorage.getItem('gasUrl')||'';
function initBanner(){if(gasUrl){document.getElementById('gas-banner').style.display='none';document.getElementById('connected-badge').classList.add('on');}else{document.getElementById('gas-banner').style.display='block';document.getElementById('connected-badge').classList.remove('on');}}
function saveGasUrl(){const v=document.getElementById('gas-url-input').value.trim();if(!v){toast('URLを入力してください');return;}gasUrl=v;localStorage.setItem('gasUrl',v);initBanner();toast('接続しました ✓');}
function resetGasUrl(){gasUrl='';localStorage.removeItem('gasUrl');initBanner();}
initBanner();
function sw(t){['scan','draft'].forEach((v,i)=>{document.getElementById('view-'+v).classList.toggle('active',v===t);document.querySelectorAll('.tab')[i].classList.toggle('active',v===t);});if(t==='draft')renderDraft();}
function today(){return new Date().toISOString().slice(0,10);}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',2400);}
function updateDraftBadge(){const n=drafts.length;const b=document.getElementById('draft-badge');b.textContent=n;b.classList.toggle('on',n>0);document.getElementById('submit-all-btn').disabled=n===0;}
updateDraftBadge();
function onFile(file){if(!file)return;const r=new FileReader();r.onload=function(e){curImg=e.target.result;document.getElementById('prev-thumb-wrap').innerHTML=`<img src="${curImg}" class="preview-thumb" alt="">`;document.getElementById('preview-card').classList.remove('on');scanReceipt(e.target.result.split(',')[1],file.type||'image/jpeg');};r.readAsDataURL(file);}
async function scanReceipt(b64,mime){
  document.getElementById('scan-msg').classList.add('on');document.getElementById('preview-card').classList.remove('on');
  try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:'この領収書の情報をJSONのみで返してください。前後テキスト不要。\n{"date":"YYYY-MM-DD","amount":数値,"store":"店舗名","category":"交通費|出張費|備品・消耗品|接待・会食費|その他","description":"用途20字以内"}'}]}]})});
  const data=await res.json();const txt=(data.content||[]).map(b=>b.text||'').join('');let p;try{p=JSON.parse(txt.replace(/```json|```/g,'').trim());}catch{p={date:today(),amount:'',store:'',category:'その他',description:''};}fillPreview(p);}
  catch{fillPreview({date:today(),amount:'',store:'',category:'その他',description:''});toast('読み取り失敗。手動で入力してください');}
  finally{document.getElementById('scan-msg').classList.remove('on');document.getElementById('preview-card').classList.add('on');}
}
function fillPreview(d){document.getElementById('p-date').value=d.date||today();document.getElementById('p-amount').value=d.amount||'';document.getElementById('p-store').value=d.store||'';document.getElementById('p-desc').value=d.description||'';const cats=['交通費','出張費','備品・消耗品','接待・会食費','その他'];const i=cats.indexOf(d.category);if(i>=0)document.getElementById('p-cat').selectedIndex=i;}
function addToDraft(){const amount=parseInt(document.getElementById('p-amount').value)||0;if(!amount){toast('金額を入力してください');return;}drafts.push({id:nid++,name:document.getElementById('applicant-name').value.trim()||'未入力',date:document.getElementById('p-date').value,amount,cat:document.getElementById('p-cat').value,store:document.getElementById('p-store').value.trim(),desc:document.getElementById('p-desc').value.trim(),image:curImg,status:'pending',step:1});saveDrafts();curImg=null;document.getElementById('preview-card').classList.remove('on');document.getElementById('fi-camera').value='';document.getElementById('fi-library').value='';updateDraftBadge();toast(`保存しました（合計${drafts.length}件）💾`);sw('draft');}
function renderDraft(){
  const el=document.getElementById('draft-list');
  document.getElementById('draft-count-label').textContent=drafts.length+'件';
  if(!drafts.length){el.innerHTML='<div class="empty-draft"><span class="e-icon">📋</span>領収書を撮影してリストに追加してください<br><span style="font-size:12px;margin-top:4px;display:block">ページを閉じても保存されます</span></div>';document.getElementById('total-row').style.display='none';return;}
  const total=drafts.reduce((a,r)=>a+r.amount,0);
  document.getElementById('total-amount').textContent='¥'+total.toLocaleString();
  document.getElementById('total-row').style.display='flex';
  const cats=['交通費','出張費','備品・消耗品','接待・会食費','その他'];
  el.innerHTML=drafts.map((r,i)=>`
    <div class="draft-item" id="item-${i}">
      <div class="draft-item-row">
        ${r.image?`<img src="${r.image}" class="draft-thumb" alt="">`:`<div class="draft-thumb-ph">🧾</div>`}
        <div class="draft-info">
          <div class="draft-name">${r.store||r.cat}</div>
          <div class="draft-meta">${r.date} ／ ${r.cat}${r.desc?` ／ ${r.desc}`:''}</div>
        </div>
        <div class="draft-amount">¥${r.amount.toLocaleString()}</div>
        <div class="item-btns">
          <button class="edit-btn" onclick="toggleEdit(${i})">編集</button>
          <button class="delete-btn" onclick="removeDraft(${i})">✕</button>
        </div>
      </div>
      <div class="edit-form" id="edit-form-${i}">
        <div class="edit-grid">
          <div class="ef"><label>日付</label><input type="date" id="e-date-${i}" value="${r.date}"></div>
          <div class="ef"><label>金額（円）</label><input type="number" id="e-amount-${i}" value="${r.amount}"></div>
          <div class="ef"><label>カテゴリ</label><select id="e-cat-${i}">${cats.map(c=>`<option${c===r.cat?' selected':''}>${c}</option>`).join('')}</select></div>
          <div class="ef"><label>店舗</label><input type="text" id="e-store-${i}" value="${r.store||''}"></div>
          <div class="ef full"><label>使用目的・メモ</label><textarea id="e-desc-${i}" placeholder="例：電球3個、〇〇現場用">${r.desc||''}</textarea></div>
        </div>
        <button class="save-edit-btn" onclick="saveEdit(${i})">✓ 修正を保存</button>
      </div>
    </div>`).join('');
}
function toggleEdit(i){document.getElementById('edit-form-'+i).classList.toggle('on');}
function saveEdit(i){const amount=parseInt(document.getElementById('e-amount-'+i).value)||0;if(!amount){toast('金額を入力してください');return;}drafts[i].date=document.getElementById('e-date-'+i).value;drafts[i].amount=amount;drafts[i].cat=document.getElementById('e-cat-'+i).value;drafts[i].store=document.getElementById('e-store-'+i).value.trim();drafts[i].desc=document.getElementById('e-desc-'+i).value.trim();saveDrafts();renderDraft();toast('修正しました ✓');}
function removeDraft(i){drafts.splice(i,1);saveDrafts();updateDraftBadge();renderDraft();}
async function submitAll(){if(!drafts.length)return;const btn=document.getElementById('submit-all-btn');btn.disabled=true;document.getElementById('sending-msg').classList.add('on');for(const r of drafts){if(gasUrl)await gasPost({action:'submit',...r});}document.getElementById('sending-msg').classList.remove('on');const count=drafts.length;drafts=[];saveDrafts();updateDraftBadge();renderDraft();toast(`${count}件まとめて申請しました ✓`);}
async function gasPost(body){if(!gasUrl)return null;try{const res=await fetch(gasUrl,{method:'POST',body:JSON.stringify(body)});return await res.json();}catch(e){return null;}}
renderDraft();
</script>
</body>
</html>
